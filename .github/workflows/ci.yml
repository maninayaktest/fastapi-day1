name: FastAPI CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python --version

      - run: pip install -r requirements.txt

      - run: docker build -t fastapi-day1 .